app = 'parle-whatsapp-bot'
primary_region = 'cdg'

[build]
  image = 'devlikeapro/waha:latest'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

[deploy]
  strategy = 'immediate'

[env]
  WHATSAPP_DEFAULT_ENGINE = 'NOWEB'

[mounts]
  source = 'waha_sessions'
  destination = '/app/.sessions'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
