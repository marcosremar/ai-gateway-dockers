name: Build trellis2 Docker image

on:
  push:
    branches: [main]
    paths:
      - "trellis2/**"
      - ".github/workflows/build-trellis2.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # TRELLIS.2 image is large (~30GB with model weights): allow 3h build time.
    # flash-attn and CUDA extension compilation are slow on CPU-only CI.
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift \
            /usr/local/graalvm /usr/local/share/chromium /usr/local/share/powershell \
            /usr/local/.ghcup /opt/az /usr/share/miniconda /usr/local/go \
            /usr/local/julia* /usr/local/sqlpackage /opt/microsoft /usr/local/aws-cli
          sudo apt-get purge -y -qq firefox google-chrome-stable \
            microsoft-edge-stable dotnet* aspnetcore* 2>/dev/null || true
          sudo apt-get autoremove -y -qq && sudo apt-get clean
          docker system prune -af
          echo "Free space:" && df -h /

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: trellis2
          file: trellis2/Dockerfile
          push: true
          tags: |
            marcosremar/trellis2:latest
            marcosremar/trellis2:${{ github.sha }}
            ghcr.io/marcosremar/trellis2:latest
            ghcr.io/marcosremar/trellis2:${{ github.sha }}
          cache-from: type=gha,scope=trellis2
          cache-to: type=gha,mode=max,scope=trellis2

      - name: Smoke test image (CPU mode, no GPU)
        run: |
          set -e
          docker run -d --rm --name smoke \
            -e ATTN_BACKEND=sdpa \
            marcosremar/trellis2:latest \
            bash -c "tail -f /dev/null"  # keep alive without running the server
          sleep 5

          echo "=== Verify file structure ==="
          docker exec smoke ls -la /app/start.sh /app/server.py /app/trellis2/o-voxel/ || (docker logs smoke; exit 1)

          echo "=== Verify start.sh is executable ==="
          docker exec smoke test -x /app/start.sh || (docker logs smoke; exit 1)

          echo "=== Verify Python can import server module ==="
          docker exec smoke python -c "
          import sys
          sys.path.insert(0, '/app/trellis2')
          # Validate ALL imports server.py needs (without actually starting the model)
          import io, time, logging, tempfile, os
          import fastapi, uvicorn, httpx
          from PIL import Image
          print('Basic imports OK')
          import torch
          print(f'torch {torch.__version__}')
          # This is the line that had the typo:
          gpu_props_attrs = [a for a in dir(torch.cuda) if 'device' in a.lower() or 'memory' in a.lower()]
          print(f'cuda attrs: {gpu_props_attrs[:5]}')
          " || (docker logs smoke; exit 1)

          echo "=== Verify sshd binary is present ==="
          docker exec smoke which sshd || (docker logs smoke; exit 1)

          echo "=== Cleanup ==="
          docker stop smoke
