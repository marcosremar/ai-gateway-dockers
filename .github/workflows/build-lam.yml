name: Build lam Docker image

on:
  push:
    branches: [main]
    paths:
      - "lam/**"
      - ".github/workflows/build-lam.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # CUDA extension compilation (diff-gaussian-rasterization, nvdiffrast, simple-knn)
    # + LAM assets download (~500MB) can take up to 90min
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (CUDA devel image + extensions need ~20GB)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift \
            /usr/local/graalvm /usr/local/share/chromium /usr/local/share/powershell \
            /usr/local/.ghcup /opt/az /usr/share/miniconda /usr/local/go \
            /usr/local/julia* /usr/local/sqlpackage /opt/microsoft /usr/local/aws-cli
          sudo apt-get purge -y -qq firefox google-chrome-stable \
            microsoft-edge-stable dotnet* aspnetcore* 2>/dev/null || true
          sudo apt-get autoremove -y -qq && sudo apt-get clean
          docker system prune -af
          echo "Free space:" && df -h /

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (CUDA 12.1, PyTorch 2.3, all GPU archs)
        uses: docker/build-push-action@v6
        with:
          context: lam
          file: lam/Dockerfile
          push: true
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          tags: |
            marcosremar/lam:latest
            marcosremar/lam:${{ github.sha }}
            ghcr.io/marcosremar/lam:latest
            ghcr.io/marcosremar/lam:${{ github.sha }}
          cache-from: type=gha,scope=lam
          cache-to: type=gha,mode=max,scope=lam
