name: Build ultravox-s2s Docker image

on:
  push:
    branches: [main]
    paths:
      - "ultravox-s2s/**"
      - ".github/workflows/build-ultravox-s2s.yml"
  workflow_dispatch:

jobs:
  # Standard image (Ampere/Ada — RTX 3090/4090)
  build-standard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift \
            /usr/local/graalvm /usr/local/share/chromium /usr/local/share/powershell \
            /usr/local/.ghcup /opt/az /usr/share/miniconda /usr/local/go \
            /usr/local/julia* /usr/local/sqlpackage /opt/microsoft /usr/local/aws-cli
          sudo apt-get purge -y -qq firefox google-chrome-stable \
            microsoft-edge-stable dotnet* aspnetcore* 2>/dev/null || true
          sudo apt-get autoremove -y -qq && sudo apt-get clean
          docker system prune -af
          echo "Free space:" && df -h /
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (standard — runpod base, cu124)
        uses: docker/build-push-action@v6
        with:
          context: ultravox-s2s
          file: ultravox-s2s/Dockerfile
          push: true
          tags: |
            marcosremar/ultravox-s2s:latest
            ghcr.io/marcosremar/ultravox-s2s:latest
          cache-from: type=gha,scope=ultravox-s2s
          cache-to: type=gha,mode=max,scope=ultravox-s2s

  # Blackwell image (RTX 5090/5080)
  build-blackwell:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift \
            /usr/local/graalvm /usr/local/share/chromium /usr/local/share/powershell \
            /usr/local/.ghcup /opt/az /usr/share/miniconda /usr/local/go \
            /usr/local/julia* /usr/local/sqlpackage /opt/microsoft /usr/local/aws-cli
          sudo apt-get purge -y -qq firefox google-chrome-stable \
            microsoft-edge-stable dotnet* aspnetcore* 2>/dev/null || true
          sudo apt-get autoremove -y -qq && sudo apt-get clean
          docker system prune -af
          echo "Free space:" && df -h /
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (Blackwell — nvidia base, cu128)
        uses: docker/build-push-action@v6
        with:
          context: ultravox-s2s
          file: ultravox-s2s/Dockerfile.blackwell
          push: true
          tags: |
            marcosremar/ultravox-s2s:blackwell
            ghcr.io/marcosremar/ultravox-s2s:blackwell
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          cache-from: type=gha,scope=ultravox-s2s-blackwell
          cache-to: type=gha,mode=max,scope=ultravox-s2s-blackwell
