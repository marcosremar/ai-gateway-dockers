name: Build snapgpu-runtime Docker image

# snapgpu-runtime is the base image for fast-cold-start GPU containers.
# It bundles CRIU + cuda-checkpoint + the snapgpu Python control plane.
#
# The Python sources (snapgpu/, gateway/, worker/, pyproject.toml) are checked
# into this repo alongside the Dockerfile — no git clone of the parent needed.

on:
  push:
    branches: [main]
    paths:
      - "snapgpu-runtime/**"
      - ".github/workflows/build-snapgpu-runtime.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift \
            /usr/local/graalvm /usr/local/share/chromium /usr/local/share/powershell \
            /usr/local/.ghcup /opt/az /usr/share/miniconda /usr/local/go \
            /usr/local/julia* /usr/local/sqlpackage /opt/microsoft /usr/local/aws-cli
          sudo apt-get purge -y -qq firefox google-chrome-stable \
            microsoft-edge-stable dotnet* aspnetcore* 2>/dev/null || true
          sudo apt-get autoremove -y -qq && sudo apt-get clean
          docker system prune -af
          echo "Free space:" && df -h /

      - name: Verify Python sources exist in build context
        run: |
          echo "Build context contents:"
          ls -la snapgpu-runtime/
          test -f snapgpu-runtime/pyproject.toml || { echo "ERROR: pyproject.toml missing"; exit 1; }
          test -d snapgpu-runtime/snapgpu || { echo "ERROR: snapgpu/ missing"; exit 1; }
          test -d snapgpu-runtime/gateway || { echo "ERROR: gateway/ missing"; exit 1; }

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push snapgpu-runtime base
        uses: docker/build-push-action@v6
        with:
          context: snapgpu-runtime
          file: snapgpu-runtime/Dockerfile
          push: true
          tags: |
            marcosremar/snapgpu-runtime:latest
            marcosremar/snapgpu-runtime:${{ github.sha }}
            ghcr.io/marcosremar/snapgpu-runtime:latest
            ghcr.io/marcosremar/snapgpu-runtime:${{ github.sha }}
          cache-from: type=gha,scope=snapgpu-runtime
          cache-to: type=gha,mode=max,scope=snapgpu-runtime
