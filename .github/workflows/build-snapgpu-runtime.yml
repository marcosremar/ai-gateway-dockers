name: Build snapgpu-runtime Docker image

# snapgpu-runtime is the base image for fast-cold-start GPU containers.
# It bundles CRIU + cuda-checkpoint + the snapgpu Python control plane.
# Concrete app images (e.g. snapgpu-runtime-babelcast) extend this base.
#
# IMPORTANT: this build needs the snapgpu/, gateway/, worker/ Python packages
# from the parent ai-gateway repo. Since this dockers/ submodule lives inside
# the parent repo, we use a relative copy in the build context.

on:
  push:
    branches: [main]
    paths:
      - "snapgpu-runtime/**"
      - ".github/workflows/build-snapgpu-runtime.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift \
            /usr/local/graalvm /usr/local/share/chromium /usr/local/share/powershell \
            /usr/local/.ghcup /opt/az /usr/share/miniconda /usr/local/go \
            /usr/local/julia* /usr/local/sqlpackage /opt/microsoft /usr/local/aws-cli
          sudo apt-get purge -y -qq firefox google-chrome-stable \
            microsoft-edge-stable dotnet* aspnetcore* 2>/dev/null || true
          sudo apt-get autoremove -y -qq && sudo apt-get clean
          docker system prune -af
          echo "Free space:" && df -h /

      # Pull the snapgpu Python source from the parent ai-gateway repo at the
      # commit pinned by the submodule. The build needs pyproject.toml +
      # snapgpu/ + gateway/ + worker/ as build context.
      - name: Fetch snapgpu Python source from parent repo
        run: |
          set -e
          # The parent repo's main branch is the canonical source.
          PARENT_REPO="https://github.com/marcosremar/ai-gateway.git"
          PARENT_REF="${SNAPGPU_PARENT_REF:-main}"
          echo "Cloning $PARENT_REPO @ $PARENT_REF..."
          git clone --depth 1 --branch "$PARENT_REF" "$PARENT_REPO" /tmp/parle-parent
          cp /tmp/parle-parent/pyproject.toml snapgpu-runtime/
          cp -r /tmp/parle-parent/snapgpu  snapgpu-runtime/snapgpu
          cp -r /tmp/parle-parent/gateway  snapgpu-runtime/gateway
          cp -r /tmp/parle-parent/worker   snapgpu-runtime/worker
          ls -la snapgpu-runtime/

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push snapgpu-runtime base
        uses: docker/build-push-action@v6
        with:
          context: snapgpu-runtime
          file: snapgpu-runtime/Dockerfile
          push: true
          tags: |
            marcosremar/snapgpu-runtime:latest
            marcosremar/snapgpu-runtime:${{ github.sha }}
            ghcr.io/marcosremar/snapgpu-runtime:latest
            ghcr.io/marcosremar/snapgpu-runtime:${{ github.sha }}
          cache-from: type=gha,scope=snapgpu-runtime
          cache-to: type=gha,mode=max,scope=snapgpu-runtime
